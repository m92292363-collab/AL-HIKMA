<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>GIU Admin Portal – Al-Hikma University</title>
  <link href="https://fonts.googleapis.com/css2?family=Amiri:wght@400;700&family=Nunito+Sans:wght@300;400;600;700;900&display=swap" rel="stylesheet"/>
  <style>
    :root {
      --g-dark:  #00793a;
      --g-mid:   #00ab52;
      --g-light: #c4f2d4;
      --g-pale:  #f0faf4;
      --white:   #ffffff;
      --td:      #1a2e22;
      --tm:      #3d5a48;
      --tl:      #6b8f79;
      --border:  #d4e8dc;
      --danger:  #e53935;
      --sidebar: 268px;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Nunito Sans', sans-serif; background: #f2f6f4; color: var(--td); min-height: 100vh; }

    /* ── SVG ICON HELPER ── */
    .icon { display: inline-flex; align-items: center; justify-content: center; flex-shrink: 0; }
    .icon svg { display: block; }

    /* ══ LOGIN ══ */
    #login-screen { position: fixed; inset: 0; z-index: 9999; background: linear-gradient(135deg, #003d20 0%, var(--g-dark) 55%, var(--g-mid) 100%); display: flex; align-items: center; justify-content: center; padding: 20px; }
    #login-screen.hidden { display: none; }
    .login-box { background: var(--white); border-radius: 22px; width: 100%; max-width: 400px; box-shadow: 0 40px 80px rgba(0,0,0,.35); overflow: hidden; }
    .lb-head { background: linear-gradient(135deg, var(--g-dark), var(--g-mid)); padding: 32px 30px 26px; text-align: center; position: relative; overflow: hidden; }
    .lb-head::before { content: ''; position: absolute; inset: 0; background: url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='%23fff' fill-opacity='0.04'%3E%3Cpath d='M36 34v-4h-2v4h-4v2h4v4h2v-4h4v-2h-4zm0-30V0h-2v4h-4v2h4v4h2V6h4V4h-4zM6 34v-4H4v4H0v2h4v4h2v-4h4v-2H6zM6 4V0H4v4H0v2h4v4h2V6h4V4H6z'/%3E%3C/g%3E%3C/svg%3E"); }
    .lb-shield { width: 64px; height: 64px; background: rgba(255,255,255,.15); border-radius: 18px; display: flex; align-items: center; justify-content: center; margin: 0 auto 16px; position: relative; }
    .lb-head h2 { font-family: 'Amiri', serif; color: #fff; font-size: 1.5rem; position: relative; }
    .lb-head p  { color: rgba(255,255,255,.72); font-size: .8rem; margin-top: 5px; position: relative; }
    .lb-body { padding: 28px 28px 32px; }
    .fg { margin-bottom: 16px; }
    .fg label { display: block; font-size: .72rem; font-weight: 700; color: var(--tm); margin-bottom: 6px; text-transform: uppercase; letter-spacing: .06em; }
    .fg input { width: 100%; padding: 12px 15px; border: 1.5px solid var(--border); border-radius: 10px; font-family: 'Nunito Sans', sans-serif; font-size: .93rem; color: var(--td); background: var(--g-pale); outline: none; transition: border-color .2s, box-shadow .2s; }
    .fg input:focus { border-color: var(--g-mid); box-shadow: 0 0 0 3px rgba(0,171,82,.12); background: #fff; }
    .btn-primary { width: 100%; padding: 13px; background: linear-gradient(135deg, var(--g-dark), var(--g-mid)); color: #fff; border: none; border-radius: 10px; font-family: 'Nunito Sans', sans-serif; font-size: 1rem; font-weight: 700; cursor: pointer; transition: opacity .2s, transform .15s; }
    .btn-primary:hover { opacity: .9; transform: translateY(-1px); }
    .btn-primary:disabled { opacity: .6; cursor: not-allowed; transform: none; }
    .err-box { display: none; margin-top: 12px; background: #fff0f0; border: 1px solid #ffcccc; color: #cc0000; border-radius: 8px; padding: 9px 14px; font-size: .83rem; }
    .err-box.show { display: block; }

    /* ══ APP ══ */
    #app { display: none; min-height: 100vh; }
    #app.show { display: flex; }

    /* ── SIDEBAR ── */
    .sidebar { width: var(--sidebar); background: var(--g-dark); display: flex; flex-direction: column; position: fixed; top: 0; left: 0; bottom: 0; z-index: 100; }
    .sb-logo { padding: 22px 20px 18px; border-bottom: 1px solid rgba(255,255,255,.1); display: flex; align-items: center; gap: 12px; }
    .sb-logo-icon { width: 38px; height: 38px; background: rgba(255,255,255,.15); border-radius: 10px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
    .sb-logo-text h2 { color: #fff; font-family: 'Amiri', serif; font-size: 1.05rem; line-height: 1.2; }
    .sb-logo-text p  { color: rgba(255,255,255,.45); font-size: .68rem; margin-top: 1px; }
    .sb-nav { flex: 1; padding: 14px 10px; overflow-y: auto; }
    .sb-section { color: rgba(255,255,255,.3); font-size: .6rem; font-weight: 700; text-transform: uppercase; letter-spacing: .12em; padding: 16px 10px 6px; }
    .sb-item { display: flex; align-items: center; gap: 10px; padding: 9px 12px; border-radius: 9px; color: rgba(255,255,255,.68); font-size: .875rem; font-weight: 600; cursor: pointer; transition: all .18s; border: none; background: none; width: 100%; text-align: left; margin-bottom: 2px; }
    .sb-item:hover  { background: rgba(255,255,255,.1); color: #fff; }
    .sb-item.active { background: rgba(255,255,255,.17); color: #fff; }
    .sb-item svg { flex-shrink: 0; opacity: .75; }
    .sb-item.active svg, .sb-item:hover svg { opacity: 1; }
    .sb-foot { padding: 14px 10px; border-top: 1px solid rgba(255,255,255,.1); }
    .admin-chip { background: rgba(255,255,255,.09); border-radius: 10px; padding: 10px 12px; display: flex; align-items: center; gap: 10px; margin-bottom: 10px; }
    .admin-av   { width: 34px; height: 34px; border-radius: 50%; background: var(--g-mid); color: #fff; display: flex; align-items: center; justify-content: center; font-weight: 900; font-size: .85rem; flex-shrink: 0; }
    .admin-info .nm { color: #fff; font-size: .85rem; font-weight: 700; }
    .admin-info .rl { color: rgba(255,255,255,.4); font-size: .67rem; }
    .btn-logout { width: 100%; padding: 9px 12px; border-radius: 8px; background: rgba(229,57,53,.12); border: 1px solid rgba(229,57,53,.25); color: #ff8a80; font-family: 'Nunito Sans', sans-serif; font-size: .83rem; font-weight: 700; cursor: pointer; transition: background .2s; display: flex; align-items: center; justify-content: center; gap: 8px; }
    .btn-logout:hover { background: rgba(229,57,53,.25); }

    /* ── MAIN ── */
    .main { margin-left: var(--sidebar); flex: 1; display: flex; flex-direction: column; min-height: 100vh; }
    .topbar { background: var(--white); border-bottom: 1px solid var(--border); padding: 16px 30px; display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 50; }
    .topbar-left h3 { font-size: 1.05rem; font-weight: 900; color: var(--td); }
    .topbar-left p  { font-size: .78rem; color: var(--tl); margin-top: 1px; }
    .content { padding: 28px 30px; flex: 1; }

    /* ── PAGES ── */
    .page { display: none; }
    .page.active { display: block; }

    /* ── STAT CARDS ── */
    .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(190px,1fr)); gap: 18px; margin-bottom: 26px; }
    .stat-card { background: var(--white); border-radius: 16px; padding: 22px 24px; border: 1.5px solid var(--border); position: relative; overflow: hidden; transition: transform .2s, box-shadow .2s; }
    .stat-card:hover { transform: translateY(-2px); box-shadow: 0 8px 24px rgba(0,121,58,.1); }
    .stat-card::before { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 3.5px; background: linear-gradient(90deg, var(--g-dark), var(--g-mid)); border-radius: 16px 16px 0 0; }
    .stat-card .sc-icon { width: 44px; height: 44px; background: var(--g-pale); border-radius: 12px; display: flex; align-items: center; justify-content: center; margin-bottom: 14px; }
    .stat-card .sc-val  { font-size: 2rem; font-weight: 900; color: var(--td); font-family: 'Amiri', serif; line-height: 1; }
    .stat-card .sc-lbl  { font-size: .72rem; color: var(--tl); text-transform: uppercase; letter-spacing: .07em; font-weight: 700; margin-top: 5px; }

    /* ── CARD ── */
    .card { background: var(--white); border-radius: 16px; border: 1.5px solid var(--border); overflow: hidden; margin-bottom: 22px; }
    .card-head { padding: 16px 22px; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; gap: 12px; flex-wrap: wrap; }
    .card-head h4 { font-size: .95rem; font-weight: 900; color: var(--td); }

    /* ── FORM ── */
    .form-card { background: var(--white); border-radius: 16px; border: 1.5px solid var(--border); padding: 26px; max-width: 660px; margin-bottom: 22px; }
    .form-card h4 { font-size: .95rem; font-weight: 900; margin-bottom: 20px; padding-bottom: 14px; border-bottom: 1px solid var(--border); color: var(--td); }
    .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
    .form-group { margin-bottom: 14px; }
    .form-group label { display: block; font-size: .72rem; font-weight: 700; color: var(--tm); margin-bottom: 6px; text-transform: uppercase; letter-spacing: .05em; }
    .form-group input,
    .form-group select { width: 100%; padding: 10px 13px; border: 1.5px solid var(--border); border-radius: 9px; font-family: 'Nunito Sans', sans-serif; font-size: .9rem; color: var(--td); background: var(--g-pale); outline: none; transition: border-color .2s; }
    .form-group input:focus,
    .form-group select:focus { border-color: var(--g-mid); background: #fff; }

    /* ── SEARCH ── */
    .search-bar { padding: 8px 13px; border: 1.5px solid var(--border); border-radius: 8px; font-family: 'Nunito Sans', sans-serif; font-size: .85rem; outline: none; transition: border-color .2s; width: 220px; }
    .search-bar:focus { border-color: var(--g-mid); }

    /* ── TABLE ── */
    .tbl-wrap { overflow-x: auto; }
    .data-tbl { width: 100%; border-collapse: collapse; font-size: .875rem; }
    .data-tbl th { background: var(--g-pale); color: var(--tm); font-weight: 700; font-size: .68rem; text-transform: uppercase; letter-spacing: .07em; padding: 11px 18px; text-align: left; border-bottom: 1.5px solid var(--border); }
    .data-tbl td { padding: 13px 18px; border-bottom: 1px solid var(--border); vertical-align: middle; }
    .data-tbl tr:last-child td { border-bottom: none; }
    .data-tbl tr:hover td { background: var(--g-pale); }
    .empty-row td { text-align: center; padding: 44px; color: var(--tl); font-size: .88rem; }

    /* ── BADGES ── */
    .badge { display: inline-block; padding: 3px 11px; border-radius: 100px; font-size: .73rem; font-weight: 700; }
    .badge-green { background: #d4f5e3; color: #006b2d; }
    .badge-blue  { background: #dceeff; color: #0055a5; }
    .badge-red   { background: #ffe0e0; color: #b30000; }
    .badge-gray  { background: #f0f0f0; color: #555; }
    .badge-warn  { background: #fff6d4; color: #856200; }

    /* ── BUTTONS ── */
    .btn { display: inline-flex; align-items: center; gap: 6px; padding: 8px 18px; border-radius: 8px; font-family: 'Nunito Sans', sans-serif; font-size: .85rem; font-weight: 700; cursor: pointer; transition: all .18s; border: none; }
    .btn-green  { background: var(--g-dark); color: #fff; }
    .btn-green:hover { background: var(--g-mid); }
    .btn-outline { background: #fff; color: var(--tm); border: 1.5px solid var(--border); }
    .btn-outline:hover { border-color: var(--g-mid); color: var(--g-dark); }
    .btn-danger { background: var(--danger); color: #fff; }
    .btn-danger:hover { background: #c62828; }
    .btn-blue   { background: #1565c0; color: #fff; }
    .btn-blue:hover { background: #0d47a1; }
    .btn-amber  { background: #f59e0b; color: #fff; }
    .btn-amber:hover { background: #d97706; }
    .btn-sm { padding: 5px 12px; font-size: .78rem; }
    .btn:disabled { opacity: .6; cursor: not-allowed; }

    /* ── DEPT CARDS GRID ── */
    .dept-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px,1fr)); gap: 18px; }
    .dept-card { background: var(--white); border: 1.5px solid var(--border); border-radius: 16px; padding: 22px; cursor: pointer; transition: transform .2s, box-shadow .2s, border-color .2s; position: relative; overflow: hidden; }
    .dept-card::before { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 4px; background: linear-gradient(90deg, var(--g-dark), var(--g-mid)); border-radius: 16px 16px 0 0; }
    .dept-card:hover { transform: translateY(-4px); box-shadow: 0 12px 32px rgba(0,121,58,.13); border-color: var(--g-light); }
    .dept-card-head { display: flex; align-items: center; gap: 14px; margin-bottom: 14px; }
    .dept-card-icon { width: 46px; height: 46px; background: var(--g-pale); border-radius: 12px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
    .dept-card-name { font-size: .95rem; font-weight: 900; color: var(--td); line-height: 1.3; }
    .dept-card-fac  { font-size: .75rem; color: var(--tl); margin-top: 2px; }
    .dept-card-stats { display: flex; gap: 16px; padding-top: 14px; border-top: 1px solid var(--border); }
    .dept-stat .ds-val { font-size: 1.3rem; font-weight: 900; color: var(--td); font-family: 'Amiri', serif; }
    .dept-stat .ds-lbl { font-size: .68rem; color: var(--tl); text-transform: uppercase; letter-spacing: .06em; font-weight: 700; }
    .dept-card-action { margin-top: 14px; }

    /* ── MODAL ── */
    .overlay { display: none; position: fixed; inset: 0; background: rgba(0,25,12,.6); backdrop-filter: blur(4px); z-index: 200; align-items: center; justify-content: center; padding: 20px; }
    .overlay.open { display: flex; }
    .modal-box { background: #fff; border-radius: 18px; width: 100%; max-width: 500px; max-height: 90vh; overflow-y: auto; box-shadow: 0 32px 80px rgba(0,0,0,.28); animation: popIn .28s cubic-bezier(.34,1.56,.64,1); }
    @keyframes popIn { from{transform:scale(.88);opacity:0} to{transform:scale(1);opacity:1} }
    .modal-box .mh { padding: 20px 24px; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; }
    .modal-box .mh h3 { font-size: 1rem; font-weight: 900; color: var(--td); }
    .modal-box .mb { padding: 22px 24px; }
    .modal-box .mf { padding: 14px 24px; border-top: 1px solid var(--border); display: flex; gap: 10px; justify-content: flex-end; }
    .x-btn { background: none; border: none; cursor: pointer; color: var(--tl); padding: 4px; border-radius: 6px; display: flex; align-items: center; }
    .x-btn:hover { background: var(--g-pale); color: var(--td); }

    /* ── TOAST ── */
    #toast { position: fixed; bottom: 26px; right: 26px; z-index: 9999; background: var(--g-dark); color: #fff; padding: 13px 20px; border-radius: 12px; font-weight: 700; font-size: .88rem; box-shadow: 0 8px 28px rgba(0,0,0,.22); transform: translateY(80px); opacity: 0; transition: all .3s; max-width: 340px; }
    #toast.show  { transform: translateY(0); opacity: 1; }
    #toast.error { background: var(--danger); }

    /* ── SPINNER ── */
    .spin { display: inline-block; width: 14px; height: 14px; border: 2px solid rgba(255,255,255,.35); border-top-color: #fff; border-radius: 50%; animation: sp .6s linear infinite; vertical-align: middle; margin-right: 6px; }
    @keyframes sp { to{transform:rotate(360deg)} }

    /* ── BACK BUTTON ── */
    .back-btn { display: inline-flex; align-items: center; gap: 8px; color: var(--g-dark); font-weight: 700; font-size: .88rem; cursor: pointer; background: none; border: none; padding: 0; margin-bottom: 20px; }
    .back-btn:hover { color: var(--g-mid); }

    /* ── ACTION STRIP ── */
    .action-strip { display: flex; gap: 8px; flex-wrap: wrap; }

    /* ── LANGUAGE TOGGLE ── */
    .lang-toggle { display: flex; align-items: center; gap: 4px; background: var(--g-pale); border: 1.5px solid var(--border); border-radius: 10px; padding: 4px; }
    .lang-btn { padding: 5px 12px; border-radius: 7px; border: none; font-family: 'Nunito Sans', sans-serif; font-size: .8rem; font-weight: 700; cursor: pointer; transition: all .18s; background: none; color: var(--tl); }
    .lang-btn.active { background: var(--g-dark); color: #fff; }
    .lang-btn:hover:not(.active) { color: var(--g-dark); }
    [dir="rtl"] .main { direction: rtl; }
    [dir="rtl"] .sidebar { left: auto; right: 0; }
    [dir="rtl"] .main { margin-left: 0; margin-right: var(--sidebar); }
    [dir="rtl"] .sb-item { text-align: right; }
    [dir="rtl"] .topbar { direction: rtl; }
    [dir="rtl"] .data-tbl th,
    [dir="rtl"] .data-tbl td { text-align: right; }
    [dir="rtl"] .form-group label { text-align: right; }
    @media (max-width: 768px) {
      .sidebar { transform: translateX(-100%); }
      .main    { margin-left: 0; }
      .form-row { grid-template-columns: 1fr; }
      .content  { padding: 16px; }
    }
<div id="login-screen">
  <div class="login-box">
    <div class="lb-head">
      <div class="lb-shield">
        <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>
      </div>
      <h2>Admin Portal</h2>
      <p>Al-Hikma University · GIU · Restricted Access</p>
    </div>
    <div class="lb-body">
      <div class="fg">
        <label>Username</label>
        <input type="text" id="l-user" placeholder="admin" autocomplete="username"/>
      </div>
      <div class="fg">
        <label>Password</label>
        <input type="password" id="l-pass" placeholder="••••••••" autocomplete="current-password"/>
      </div>
      <button class="btn-primary" id="l-btn" onclick="doAdminLogin()">Sign In</button>
      <div class="err-box" id="l-err"></div>
    </div>
  </div>
</div>

<!-- ══ APP ══ -->
<div id="app">

  <!-- SIDEBAR -->
  <div class="sidebar">
    <div class="sb-logo">
      <div class="sb-logo-icon">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>
      </div>
      <div class="sb-logo-text">
        <h2>GIU Admin</h2>
        <p>Al-Hikma University</p>
      </div>
    </div>
    <nav class="sb-nav">
      <div class="sb-section">Overview</div>
      <button class="sb-item active" onclick="goPage('dashboard',this)">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/></svg>
        Dashboard
      </button>

      <div class="sb-section">Students</div>
      <button class="sb-item" onclick="goPage('students',this)">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
        All Students
      </button>
      <button class="sb-item" onclick="goPage('add-student',this)">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M16 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="8.5" cy="7" r="4"/><line x1="20" y1="8" x2="20" y2="14"/><line x1="23" y1="11" x2="17" y2="11"/></svg>
        Add Student
      </button>

      <div class="sb-section">Departments</div>
      <button class="sb-item" onclick="goPage('departments',this)">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/></svg>
        All Departments
      </button>

      <div class="sb-section">Results</div>
      <button class="sb-item" onclick="goPage('results',this)">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/><polyline points="10 9 9 9 8 9"/></svg>
        All Results
      </button>
      <button class="sb-item" onclick="goPage('add-result',this)">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
        Add Result

<div id="toast"></div>

<script>
  /* ══════════════════════════════════════
     DATA
  ══════════════════════════════════════ */
  const DEPTS = {
    'Faculty of Education':                ['Department of Islamic Studies','Department of Curriculum and Teaching Methodology'],
    'Faculty of Arts and Humanity':        ['Department of Arabic Language','Department of Media and Journalism'],
    'Faculty of Quran and Islamic Studies':['Department of Tafsir','Department of Qiraat'],
    'Faculty of Sharia and Law':           ['Department of Sharia','Department of Law'],
  };

  const ALL_DEPTS = [
    { dept:'Department of Islamic Studies',                    fac:'Faculty of Education' },
    { dept:'Department of Curriculum and Teaching Methodology',fac:'Faculty of Education' },
    { dept:'Department of Arabic Language',                    fac:'Faculty of Arts and Humanity' },
    { dept:'Department of Media and Journalism',               fac:'Faculty of Arts and Humanity' },
    { dept:'Department of Tafsir',                             fac:'Faculty of Quran and Islamic Studies' },
    { dept:'Department of Qiraat',                             fac:'Faculty of Quran and Islamic Studies' },
    { dept:'Department of Sharia',                             fac:'Faculty of Sharia and Law' },
    { dept:'Department of Law',                                fac:'Faculty of Sharia and Law' },
  ];

  const PAGE_META = {
    'dashboard':     { title:'Dashboard',             sub:'Overview of Al-Hikma University' },
    'students':      { title:'All Students',           sub:'Manage all enrolled students' },
    'add-student':   { title:'Add Student',            sub:'Enrol a new student' },
    'departments':   { title:'All Departments',        sub:'View and manage all 8 departments' },
    'dept-detail':   { title:'Department Detail',      sub:'Students in this department' },
    'results':       { title:'All Results',            sub:'View and manage academic results' },
    'add-result':    { title:'Add Result',             sub:'Post or update a student result' },
    'reset-pw':      { title:'Reset Password',         sub:'Change a student login password' },
  };

  let _token = null, _students = [], _results = [], _pendingDel = null, _moveStudent = null, _currentDept = null;

  /* ══════════════════════════════════════
     LOGIN
  ══════════════════════════════════════ */
  async function doAdminLogin() {
    const username = document.getElementById('l-user').value.trim();
    const password = document.getElementById('l-pass').value;
    const errEl    = document.getElementById('l-err');
    const btn      = document.getElementById('l-btn');
    errEl.classList.remove('show');
    if (!username || !password) { errEl.textContent = 'Enter username and password.'; errEl.classList.add('show'); return; }
    btn.disabled = true; btn.innerHTML = '<span class="spin"></span>Signing in…';
    try {
      const res  = await fetch('/.netlify/functions/admin-login', { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({username,password}) });
      const data = await res.json();
      if (!res.ok || !data.success) { errEl.textContent = data.message || 'Invalid credentials.'; errEl.classList.add('show'); return; }
      _token = data.token;
      document.getElementById('admin-nm').textContent = data.admin?.username || 'Admin';
      document.getElementById('admin-av').textContent = (data.admin?.username || 'A')[0].toUpperCase();
      document.getElementById('login-screen').classList.add('hidden');
      document.getElementById('app').classList.add('show');
      loadDashboard();
    } catch (e) { errEl.textContent = 'Connection error. Please try again.'; errEl.classList.add('show'); }
    finally { btn.disabled = false; btn.textContent = 'Sign In'; }
  }

  function doLogout() {
    _token = null; _students = []; _results = [];
    document.getElementById('app').classList.remove('show');
    document.getElementById('login-screen').classList.remove('hidden');
    document.getElementById('l-user').value = '';
    document.getElementById('l-pass').value = '';
    document.getElementById('l-err').classList.remove('show');
  }

  /* ══════════════════════════════════════
     NAVIGATION
  ══════════════════════════════════════ */
  function goPage(id, el) {
    document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
    document.querySelectorAll('.sb-item').forEach(b => b.classList.remove('active'));
    document.getElementById('page-' + id).classList.add('active');
    if (el) el.classList.add('active');
    const m = PAGE_META[id] || {};
    document.getElementById('page-title').textContent = m.title || id;
    document.getElementById('page-sub').textContent   = m.sub   || '';
    if (id === 'dashboard')   loadDashboard();
    if (id === 'students')    loadStudents();
    if (id === 'departments') loadDepartments();
    if (id === 'results')     loadResults();
  }

  /* ══════════════════════════════════════
     API HELPER
  ══════════════════════════════════════ */
  async function api(fn, method = 'GET', body = null) {
    const opts = { method, headers: { 'Content-Type':'application/json', 'Authorization':'Bearer '+_token } };
    if (body) opts.body = JSON.stringify(body);
    const res  = await fetch('/.netlify/functions/' + fn, opts);
    const data = await res.json();
    return { ok: res.ok, data };
  }

  /* ══════════════════════════════════════
     DASHBOARD
  ══════════════════════════════════════ */
  async function loadDashboard() {
    try {
      const [sr, rr] = await Promise.all([api('get-all-students'), api('get-all-results')]);
      _students = sr.data.students || [];
      _results  = rr.data.results  || [];
      document.getElementById('d-students').textContent = _students.length;
      document.getElementById('d-results').textContent  = _results.length;
      const recent = _students.slice(0, 6);
      document.getElementById('d-recent').innerHTML = recent.length
        ? recent.map(s => `<tr>
            <td><code style="background:var(--g-pale);padding:2px 8px;border-radius:5px;font-size:.8rem;font-weight:700">${s.student_id}</code></td>
            <td style="font-weight:700">${s.full_name}</td>
            <td style="color:var(--tl)">${s.email}</td>
            <td>${s.faculty}</td>
            <td><span class="badge badge-green">Year ${s.year}</span></td>
          </tr>`).join('')
        : '<tr><td colspan="5" style="text-align:center;padding:30px;color:var(--tl)">No students enrolled yet.</td></tr>';
    } catch (e) { toast('Failed to load dashboard.', true); }
  }

  /* ══════════════════════════════════════
     ALL STUDENTS
  ══════════════════════════════════════ */
  async function loadStudents() {
    document.getElementById('s-body').innerHTML = '<tr><td colspan="7" style="text-align:center;padding:30px;color:var(--tl)">Loading…</td></tr>';
    try {
      const { data } = await api('get-all-students');
      _students = data.students || [];
      renderStudents(_students);
    } catch (e) { toast('Failed to load students.', true); }
  }

  function renderStudents(list) {
    const tb = document.getElementById('s-body');
    if (!list.length) { tb.innerHTML = '<tr class="empty-row"><td colspan="7">No students found.</td></tr>'; return; }
    tb.innerHTML = list.map(s => `<tr>
      <td><code style="background:var(--g-pale);padding:2px 8px;border-radius:5px;font-size:.8rem;font-weight:700">${s.student_id}</code></td>
      <td style="font-weight:700">${s.full_name}</td>
      <td style="color:var(--tl)">${s.email}</td>
      <td>${s.faculty}</td>
      <td>${s.department}</td>
      <td><span class="badge badge-green">Year ${s.year}</span></td>
      <td>
        <div class="action-strip">
          <button class="btn btn-blue btn-sm" onclick="openMoveModal('${s.student_id}','${s.full_name}','${s.year}')">Move</button>
          <button class="btn btn-danger btn-sm" onclick="confirmDel('student','${s.student_id}','${s.full_name}')">Delete</button>
        </div>
      </td>
    </tr>`).join('');
  }

  function filterStudents() {
    const q = document.getElementById('s-search').value.toLowerCase();
    const f = document.getElementById('s-fac').value;
    renderStudents(_students.filter(s =>
      (!q || s.full_name.toLowerCase().includes(q) || s.student_id.toLowerCase().includes(q) || s.email.toLowerCase().includes(q)) &&
      (!f || s.faculty === f)
    ));
  }

  async function addStudent() {
    const id   = document.getElementById('ns-id').value.trim();
    const name = document.getElementById('ns-name').value.trim();
    const email= document.getElementById('ns-email').value.trim();
    const fac  = document.getElementById('ns-fac').value;
    const dept = document.getElementById('ns-dept').value;
    const year = document.getElementById('ns-year').value;
    const pw   = document.getElementById('ns-pw').value;
    if (!id||!name||!email||!fac||!dept||!year||!pw) { toast('Please fill in all fields.', true); return; }
    const btn = document.getElementById('ns-btn');
    btn.disabled = true; btn.innerHTML = '<span class="spin"></span>Adding…';
    try {
      const { ok, data } = await api('add-student','POST',{student_id:id,email,full_name:name,faculty:fac,department:dept,year:parseInt(year),password:pw});
      if (ok && data.success) {
        toast('Student added successfully!');
        ['ns-id','ns-name','ns-email','ns-pw'].forEach(i => document.getElementById(i).value = '');
        document.getElementById('ns-fac').value = '';
        document.getElementById('ns-dept').innerHTML = '<option value="">Select Department</option>';
        document.getElementById('ns-year').value = '';
      } else toast(data.message||'Failed to add student.', true);
    } catch(e) { toast('Error adding student.', true); }
    finally { btn.disabled = false; btn.innerHTML = '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg> Add Student'; }
  }

  /* ══════════════════════════════════════
     DEPARTMENTS OVERVIEW
  ══════════════════════════════════════ */
  async function loadDepartments() {
    if (!_students.length) {
      const { data } = await api('get-all-students');
      _students = data.students || [];
    }
    if (!_results.length) {
      const { data } = await api('get-all-results');
      _results = data.results || [];
    }

    const grid = document.getElementById('dept-grid');
    grid.innerHTML = ALL_DEPTS.map(d => {
      const count   = _students.filter(s => s.department === d.dept).length;
      const rCount  = _results.filter(r => {
        const st = _students.find(s => s.student_id === r.student_id);
        return st && st.department === d.dept;
      }).length;
      const shortName = d.dept.replace('Department of ', '');
      return `<div class="dept-card" onclick="openDeptDetail('${d.dept.replace(/'/g,"\\'")}','${d.fac.replace(/'/g,"\\'")}')">
        <div class="dept-card-head">
          <div class="dept-card-icon">
            <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="var(--g-dark)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/></svg>
          </div>
          <div>
            <div class="dept-card-name">${shortName}</div>
            <div class="dept-card-fac">${d.fac}</div>
          </div>
        </div>
        <div class="dept-card-stats">
          <div class="dept-stat"><div class="ds-val">${count}</div><div class="ds-lbl">Students</div></div>
          <div class="dept-stat"><div class="ds-val">${rCount}</div><div class="ds-lbl">Results</div></div>
        </div>
        <div class="dept-card-action">
          <span class="btn btn-green btn-sm" style="width:100%;justify-content:center">
            <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"/></svg>
            View Department
          </span>
        </div>
      </div>`;
    }).join('');
  }

  /* ══════════════════════════════════════
     DEPARTMENT DETAIL
  ══════════════════════════════════════ */
  function openDeptDetail(dept, fac) {
    _currentDept = dept;
    document.getElementById('detail-dept-name').textContent = dept;
    document.getElementById('detail-fac-name').textContent  = fac;
    document.getElementById('page-title').textContent = dept.replace('Department of ','');
    document.getElementById('page-sub').textContent   = fac + ' · Al-Hikma University';
    document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
    document.querySelectorAll('.sb-item').forEach(b => b.classList.remove('active'));
    document.getElementById('page-dept-detail').classList.add('active');
    renderDeptDetail(_students.filter(s => s.department === dept));
  }

  function renderDeptDetail(list) {
    const tb = document.getElementById('dd-body');
    if (!list.length) { tb.innerHTML = '<tr class="empty-row"><td colspan="5">No students in this department yet.</td></tr>'; return; }
    const rCount = {};
    _results.forEach(r => { rCount[r.student_id] = (rCount[r.student_id]||0)+1; });
    tb.innerHTML = list.map(s => `<tr>
      <td><code style="background:var(--g-pale);padding:2px 8px;border-radius:5px;font-size:.8rem;font-weight:700">${s.student_id}</code></td>
      <td style="font-weight:700">${s.full_name}</td>
      <td style="color:var(--tl)">${s.email}</td>
      <td><span class="badge badge-green">Year ${s.year}</span></td>
      <td>
        <div class="action-strip">
          <button class="btn btn-blue btn-sm" onclick="openMoveModal('${s.student_id}','${s.full_name}','${s.year}')">
            <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="5 9 2 12 5 15"/><polyline points="9 5 12 2 15 5"/><line x1="2" y1="12" x2="22" y2="12"/><line x1="12" y1="2" x2="12" y2="22"/></svg>
            Move
          </button>
          <button class="btn btn-amber btn-sm" onclick="quickResetPw('${s.student_id}','${s.full_name}')">
            <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
            Reset PW
          </button>
          <button class="btn btn-danger btn-sm" onclick="confirmDel('student','${s.student_id}','${s.full_name}')">
            <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14H6L5 6"/><path d="M10 11v6"/><path d="M14 11v6"/><path d="M9 6V4h6v2"/></svg>
            Delete
          </button>
        </div>
      </td>
    </tr>`).join('');
  }

  function filterDeptDetail() {
    const q = document.getElementById('dd-search').value.toLowerCase();
    const y = document.getElementById('dd-year').value;
    const list = _students.filter(s =>
      s.department === _currentDept &&
      (!q || s.full_name.toLowerCase().includes(q) || s.student_id.toLowerCase().includes(q)) &&
      (!y || String(s.year) === y)
    );
    renderDeptDetail(list);
  }

  /* ══════════════════════════════════════
     MOVE STUDENT
  ══════════════════════════════════════ */
  function openMoveModal(sid, name, year) {
    _moveStudent = sid;
    document.getElementById('move-student-name').textContent = name + ' (' + sid + ')';
    document.getElementById('move-year').value = year;
    document.getElementById('move-fac').value  = '';
    document.getElementById('move-dept').innerHTML = '<option value="">Select Department</option>';
    document.getElementById('move-overlay').classList.add('open');
  }

  async function executeMove() {
    const fac  = document.getElementById('move-fac').value;
    const dept = document.getElementById('move-dept').value;
    const year = document.getElementById('move-year').value;
    if (!fac || !dept) { toast('Please select faculty and department.', true); return; }
    const btn = document.getElementById('move-btn');
    btn.disabled = true; btn.innerHTML = '<span class="spin"></span>Moving…';
    try {
      const { ok, data } = await api('update-student','POST',{ student_id: _moveStudent, faculty: fac, department: dept, year: parseInt(year) });
      if (ok && data.success) {
        toast('Student moved successfully!');
        closeOverlay('move-overlay');
        const { data: sd } = await api('get-all-students');
        _students = sd.students || [];
        if (_currentDept) renderDeptDetail(_students.filter(s => s.department === _currentDept));
        else renderStudents(_students);
      } else toast(data.message||'Failed to move student.', true);
    } catch(e) { toast('Error moving student.', true); }
    finally { btn.disabled = false; btn.textContent = 'Move Student'; }
  }

  /* ══════════════════════════════════════
     QUICK RESET PASSWORD
  ══════════════════════════════════════ */
  function quickResetPw(sid, name) {
    const pw = prompt('Enter new password for ' + name + ' (' + sid + '):');
    if (!pw) return;
    api('reset-password','POST',{ student_id: sid, new_password: pw }).then(({ ok, data }) => {
      if (ok && data.success) toast('Password reset for ' + name + '!');
      else toast(data.message||'Failed to reset password.', true);
    });
  }

  /* ══════════════════════════════════════
     RESULTS
  ══════════════════════════════════════ */
  async function loadResults() {
    document.getElementById('r-body').innerHTML = '<tr><td colspan="8" style="text-align:center;padding:30px;color:var(--tl)">Loading…</td></tr>';
    try {
      const { data } = await api('get-all-results');
      _results = data.results || [];
      renderResults(_results);
    } catch(e) { toast('Failed to load results.', true); }
  }

  function renderResults(list) {
    const tb = document.getElementById('r-body');
    if (!list.length) { tb.innerHTML = '<tr class="empty-row"><td colspan="8">No results found.</td></tr>'; return; }
    tb.innerHTML = list.map(r => {
      const gc   = r.grade?.[0]==='A'?'badge-green':r.grade?.[0]==='B'?'badge-blue':r.grade?.[0]==='F'?'badge-red':'badge-gray';
      const pass = Number(r.marks)>=50;
      return `<tr>
        <td><code style="background:var(--g-pale);padding:2px 8px;border-radius:5px;font-size:.8rem;font-weight:700">${r.student_id}</code></td>
        <td style="font-weight:700">${r.subject_name}</td>
        <td>Year ${r.year}</td><td>Sem ${r.semester}</td>
        <td><strong>${r.marks}</strong>/100</td>
        <td><span class="badge ${gc}">${r.grade}</span></td>
        <td style="font-weight:700;color:${pass?'#006b2d':'#b30000'}">${pass?'✓ Pass':'✗ Fail'}</td>
        <td><button class="btn btn-danger btn-sm" onclick="confirmDel('result',${r.id},'${r.subject_name}')">Delete</button></td>
      </tr>`;
    }).join('');
  }

  function filterResults() {
    const q = document.getElementById('r-search').value.toLowerCase();
    renderResults(_results.filter(r => !q || r.student_id.toLowerCase().includes(q)));
  }

  async function addResult() {
    const sid=document.getElementById('nr-sid').value.trim(), subject=document.getElementById('nr-subject').value.trim();
    const year=document.getElementById('nr-year').value, sem=document.getElementById('nr-sem').value;
    const marks=parseInt(document.getElementById('nr-marks').value), credits=parseInt(document.getElementById('nr-credits').value);
    if (!sid||!subject||isNaN(marks)||isNaN(credits)) { toast('Please fill in all fields.', true); return; }
    if (marks<0||marks>100) { toast('Marks must be 0–100.', true); return; }
    const btn = document.getElementById('nr-btn');
    btn.disabled = true; btn.innerHTML = '<span class="spin"></span>Saving…';
    try {
      const { ok, data } = await api('add-marks','POST',{student_id:sid,subject_name:subject,year:parseInt(year),semester:parseInt(sem),marks,credit_hours:credits});
      if (ok&&data.success) { toast('Result saved! Grade: '+data.grade); ['nr-sid','nr-subject','nr-marks'].forEach(i=>document.getElementById(i).value=''); document.getElementById('nr-credits').value='3'; }
      else toast(data.message||'Failed to save.', true);
    } catch(e) { toast('Error saving result.', true); }
    finally { btn.disabled=false; btn.textContent='Save Result'; }
  }

  /* ══════════════════════════════════════
     RESET PASSWORD PAGE
  ══════════════════════════════════════ */
  async function resetPassword() {
    const sid=document.getElementById('rp-sid').value.trim(), pw=document.getElementById('rp-pw').value;
    if (!sid||!pw) { toast('Please fill in all fields.', true); return; }
    const btn = document.getElementById('rp-btn');
    btn.disabled=true; btn.innerHTML='<span class="spin"></span>Resetting…';
    try {
      const { ok, data } = await api('reset-password','POST',{student_id:sid,new_password:pw});
      if (ok&&data.success) { toast('Password reset successfully!'); document.getElementById('rp-sid').value=''; document.getElementById('rp-pw').value=''; }
      else toast(data.message||'Failed.', true);
    } catch(e) { toast('Error.', true); }
    finally { btn.disabled=false; btn.textContent='Reset Password'; }
  }

  /* ══════════════════════════════════════
     DELETE
  ══════════════════════════════════════ */
  function confirmDel(type, id, label) {
    _pendingDel = { type, id };
    document.getElementById('confirm-msg').textContent = 'Are you sure you want to delete "' + label + '"? This cannot be undone.';
    document.getElementById('confirm-overlay').classList.add('open');
    document.getElementById('confirm-ok').onclick = executeDel;
  }

  async function executeDel() {
    closeOverlay('confirm-overlay');
    if (!_pendingDel) return;
    const { type, id } = _pendingDel;
    try {
      const res = type==='student' ? await api('delete-student','DELETE',{student_id:id}) : await api('delete-results','DELETE',{id});
      if (res.ok&&res.data.success) {
        toast('Deleted successfully.');
        const { data: sd } = await api('get-all-students');
        _students = sd.students || [];
        if (type==='student' && _currentDept) renderDeptDetail(_students.filter(s=>s.department===_currentDept));
        else if (type==='student') renderStudents(_students);
        else loadResults();
      } else toast(res.data.message||'Delete failed.', true);
    } catch(e) { toast('Error deleting.', true); }
  }

  /* ══════════════════════════════════════
     HELPERS
  ══════════════════════════════════════ */
  function loadDepts(facId, deptId) {
    const depts = DEPTS[document.getElementById(facId).value] || [];
    document.getElementById(deptId).innerHTML = '<option value="">Select Department</option>' + depts.map(d=>'<option>'+d+'</option>').join('');
  }

  function closeOverlay(id) { document.getElementById(id).classList.remove('open'); }

  function toast(msg, isErr=false) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.className = 'show' + (isErr?' error':'');
    setTimeout(()=>{ t.className=''; }, 3500);
  }

  document.addEventListener('keydown', e => {
    if (e.key==='Enter' && !document.getElementById('login-screen').classList.contains('hidden')) doAdminLogin();
  });

  let _currentLang = 'en';

  function setLang(lang) {
    _currentLang = lang;
    const t = TRANSLATIONS[lang];
    const isAr = lang === 'ar';

    /* toggle buttons */
    document.getElementById('lang-en').classList.toggle('active', !isAr);
    document.getElementById('lang-ar').classList.toggle('active', isAr);

    /* page direction */
    document.getElementById('app').setAttribute('dir', isAr ? 'rtl' : 'ltr');
    document.getElementById('app').style.fontFamily = isAr ? "'Amiri', serif" : "'Nunito Sans', sans-serif";

    /* sidebar sections */
    document.querySelectorAll('.sb-section').forEach((el, i) => {
      const keys = ['sb_overview','sb_students_sec','sb_depts_sec','sb_results_sec','sb_tools_sec'];
      if (keys[i]) el.textContent = t[keys[i]];
    });

    /* sidebar items */
    const sbItems = document.querySelectorAll('.sb-item');
    const sbKeys  = ['sb_dashboard','sb_students','sb_add_student','sb_depts','sb_results','sb_add_result','sb_reset'];
    sbItems.forEach((el, i) => {
      if (sbKeys[i]) {
        const svg = el.querySelector('svg');
        el.textContent = t[sbKeys[i]];
        if (svg) el.prepend(svg);
      }
    });

    /* admin role */
    const rl = document.querySelector('.admin-info .rl');
    if (rl) rl.textContent = t.sb_role;

    /* sign out */
    const logout = document.querySelector('.btn-logout');
    if (logout) {
      const svg = logout.querySelector('svg');
      logout.textContent = t.sb_signout;
      if (svg) logout.prepend(svg);
    }

    /* stat labels */
    const scLbls = document.querySelectorAll('.sc-lbl');
    const scKeys = ['stat_students','stat_results','stat_faculties','stat_depts'];
    scLbls.forEach((el, i) => { if (scKeys[i]) el.textContent = t[scKeys[i]]; });

    /* recent students title */
    const recentH4 = document.querySelector('#page-dashboard .card-head h4');
    if (recentH4) recentH4.textContent = t.recent_title;

    /* login screen */
    const lh2 = document.querySelector('.lb-head h2');
    const lp  = document.querySelector('.lb-head p');
    if (lh2) lh2.textContent = t.login_title;
    if (lp)  lp.textContent  = t.login_sub;
    const lbls = document.querySelectorAll('.lb-body .fg label');
    if (lbls[0]) lbls[0].textContent = t.login_username;
    if (lbls[1]) lbls[1].textContent = t.login_password;
    const loginBtn = document.getElementById('l-btn');
    if (loginBtn) loginBtn.textContent = t.login_btn;

    /* current page title & sub */
    const currentPage = document.querySelector('.page.active');
    if (currentPage) {
      const id = currentPage.id.replace('page-','');
      if (t['page-title-'+id]) document.getElementById('page-title').textContent = t['page-title-'+id];
      if (t['page-sub-'+id])   document.getElementById('page-sub').textContent   = t['page-sub-'+id];
    }
  }
